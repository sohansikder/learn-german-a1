<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netzwerk neu A1 — Vocabulary Quiz | DeutschBlitz</title>
  <meta name="description" content="Master all vocabulary from Netzwerk neu A1 chapters 1-12 with interactive quizzes. German-English vocabulary trainer." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

  <!-- React via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.21.4/babel.min.js"></script>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.body.innerHTML += '<div style="color:red; font-size:20px; background:black; padding:20px; position:absolute; z-index:9999;">' + 
        message + '<br>' + source + ':' + lineno + ':' + colno + 
        (error && error.stack ? '<br>' + error.stack : '') + '</div>';
    };
  </script>

  <style>
    /* ═══════════════════════════════════════════════
       DESIGN SYSTEM — Tokens & Base
       ═══════════════════════════════════════════════ */
    :root {
      --bg-primary: #0b1120;
      --bg-secondary: #111827;
      --bg-card: rgba(30, 41, 59, 0.5);
      --bg-card-hover: rgba(30, 41, 59, 0.7);
      --border-subtle: rgba(71, 85, 105, 0.5);
      --border-accent: rgba(59, 130, 246, 0.5);

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;

      --accent-blue: #3b82f6;
      --accent-cyan: #06b6d4;
      --accent-green: #10b981;
      --accent-amber: #f59e0b;
      --accent-red: #ef4444;
      --accent-purple: #8b5cf6;

      --gradient-primary: linear-gradient(135deg, #3b82f6, #06b6d4);
      --gradient-warm: linear-gradient(135deg, #f59e0b, #ef4444);
      --gradient-green: linear-gradient(135deg, #10b981, #06b6d4);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 24px;
      --radius-full: 9999px;

      --shadow-card: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.2);
      --shadow-hover: 0 20px 25px -5px rgba(0,0,0,0.3), 0 8px 10px -6px rgba(0,0,0,0.2);
      --shadow-glow-blue: 0 0 40px rgba(59, 130, 246, 0.15);
      --shadow-glow-green: 0 0 40px rgba(16, 185, 129, 0.15);

      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════════
       BACKGROUND EFFECTS
       ═══════════════════════════════════════════════ */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 20% 30%, rgba(59,130,246,0.08), transparent),
        radial-gradient(ellipse 500px 300px at 80% 70%, rgba(6,182,212,0.06), transparent),
        radial-gradient(ellipse 400px 400px at 50% 50%, rgba(139,92,246,0.04), transparent);
    }

    /* ═══════════════════════════════════════════════
       HOME SCREEN
       ═══════════════════════════════════════════════ */
    .home-header {
      padding: 48px 24px 16px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .home-header__back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .home-header__back:hover { color: var(--accent-blue); }
    .home-header__back svg { width: 16px; height: 16px; }

    .home-header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .home-header p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 500px;
    }

    /* Stats Cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    .stat-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      border-color: var(--border-accent);
      box-shadow: var(--shadow-glow-blue);
    }

    .stat-card__label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-card__label svg { flex-shrink: 0; }
    .stat-card__label span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .stat-card__value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    /* Chapter Grid */
    .chapters-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .chapters-section h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 32px;
    }

    .chapters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .chapter-card {
      position: relative;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 28px 28px 28px 36px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .chapter-card:hover {
      border-color: var(--accent-blue);
      box-shadow: var(--shadow-hover), 0 0 30px rgba(59,130,246,0.12);
      transform: translateY(-2px);
    }

    .chapter-card__accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--gradient-primary);
      border-radius: var(--radius-lg) 0 0 var(--radius-lg);
      transition: width 0.3s;
    }
    .chapter-card:hover .chapter-card__accent { width: 6px; }

    .chapter-card__top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .chapter-card__num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-blue);
    }

    .chapter-card__badge {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent-green);
      padding: 3px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 700;
    }

    .chapter-card__title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 4px 0 4px;
    }

    .chapter-card__desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .chapter-card__footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(71, 85, 105, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chapter-card__words {
      font-size: 12px;
      color: var(--text-muted);
    }

    .chapter-card__attempts {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ═══════════════════════════════════════════════
       GAME SCREEN
       ═══════════════════════════════════════════════ */
    .game-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .game-inner { max-width: 640px; width: 100%; }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .game-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .game-header__right { text-align: right; }
    .game-header__progress-text {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .game-header__score {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent-green);
    }

    /* Progress Bar */
    .progress-bar {
      height: 6px;
      background: var(--bg-card);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin-bottom: 36px;
    }
    .progress-bar__fill {
      height: 100%;
      background: var(--gradient-primary);
      border-radius: var(--radius-full);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Question Card */
    .question-card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-2xl);
      padding: 64px 40px;
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }
    .question-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(59,130,246,0.05), transparent 60%);
      pointer-events: none;
    }

    .question-card__label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .question-card__word {
      font-size: clamp(2.5rem, 7vw, 4rem);
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
    }

    /* Options */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .option-btn {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 18px 24px;
      text-align: left;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font-family);
      position: relative;
      overflow: hidden;
    }
    .option-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-primary);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .option-btn:hover {
      border-color: var(--accent-blue);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
      transform: translateX(4px);
    }
    .option-btn:hover::before { opacity: 0.06; }
    .option-btn:active { transform: scale(0.98); }

    .option-btn--correct {
      border-color: var(--accent-green) !important;
      background: rgba(16, 185, 129, 0.1) !important;
      animation: flash-correct 0.4s ease;
    }
    .option-btn--wrong {
      border-color: var(--accent-red) !important;
      background: rgba(239, 68, 68, 0.1) !important;
      animation: shake 0.4s ease;
    }

    @keyframes flash-correct {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.3); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* ═══════════════════════════════════════════════
       RESULTS SCREEN
       ═══════════════════════════════════════════════ */
    .results-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .results-inner { max-width: 720px; width: 100%; }

    .results-hero {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-2xl);
      padding: 56px 40px;
      text-align: center;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .results-hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 28px;
    }

    .score-ring {
      display: inline-block;
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 28px;
    }
    .score-ring__bg {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--gradient-primary);
      opacity: 0.15;
    }
    .score-ring__inner {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-ring__percent {
      font-size: 3rem;
      font-weight: 800;
      color: var(--text-primary);
    }
    .score-ring__fraction {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .results-message {
      font-size: 1.4rem;
      font-weight: 700;
    }
    .results-message--perfect { color: var(--accent-green); }
    .results-message--great { color: var(--accent-blue); }
    .results-message--good { color: var(--accent-amber); }
    .results-message--ok { color: var(--text-secondary); }

    /* Stats Grid */
    .results-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .results-stat {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
    }
    .results-stat__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .results-stat__value {
      font-size: 1.8rem;
      font-weight: 800;
    }
    .results-stat__value--white { color: var(--text-primary); }
    .results-stat__value--green { color: var(--accent-green); }

    /* Wrong Answers */
    .review-section {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-2xl);
      padding: 32px;
      margin-bottom: 28px;
    }
    .review-section h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
    }
    .review-item {
      background: rgba(15, 23, 42, 0.5);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 12px;
    }
    .review-item:last-child { margin-bottom: 0; }
    .review-item__word {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .review-item__wrong {
      font-size: 13px;
      color: var(--accent-red);
      margin-bottom: 4px;
    }
    .review-item__correct {
      font-size: 13px;
      color: var(--accent-green);
    }

    /* Action Buttons */
    .results-actions {
      display: flex;
      gap: 16px;
    }

    .btn-action {
      flex: 1;
      padding: 18px 24px;
      border-radius: var(--radius-lg);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font-family);
      border: none;
    }
    .btn-action--primary {
      background: var(--gradient-primary);
      color: white;
    }
    .btn-action--primary:hover {
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
      transform: translateY(-2px);
    }
    .btn-action--secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }
    .btn-action--secondary:hover {
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }

    /* ═══════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════ */
    @media (max-width: 640px) {
      .stats-row { grid-template-columns: 1fr; }
      .chapters-grid { grid-template-columns: 1fr; }
      .results-stats { grid-template-columns: 1fr; }
      .results-actions { flex-direction: column; }
      .question-card { padding: 48px 24px; }
    }

    /* ═══════════════════════════════════════════════
       FADE TRANSITIONS
       ═══════════════════════════════════════════════ */
    .screen-enter {
      animation: fadeSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Audio Button */
    .audio-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border-subtle);
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent-blue);
      cursor: pointer;
      font-size: 20px;
      transition: all 0.25s ease;
      flex-shrink: 0;
      font-family: var(--font-family);
    }
    .audio-btn:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: var(--accent-blue);
      transform: scale(1.1);
      box-shadow: 0 0 16px rgba(59, 130, 246, 0.2);
    }
    .audio-btn:active { transform: scale(0.95); }
    .audio-btn--playing {
      animation: pulse-audio 0.8s ease infinite;
    }
    @keyframes pulse-audio {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
    }

    .audio-btn--sm {
      width: 32px;
      height: 32px;
      font-size: 15px;
    }

    .question-card__word-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .question-card__example {
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }
    .question-card__example-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: var(--radius-full);
      padding: 8px 20px 8px 16px;
    }
    .question-card__example-text {
      font-size: 1rem;
      font-style: italic;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .review-item__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .review-item__example {
      font-size: 12px;
      font-style: italic;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    /* ═══════════════════════════════════════════════════════════
       AUDIO — German pronunciation via Web Speech API
       ═══════════════════════════════════════════════════════════ */
    const playAudio = (text) => {
      if (!text || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'de-DE';
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    };

    const AudioBtn = ({ text, small }) => {
      const [playing, setPlaying] = useState(false);
      const handleClick = (e) => {
        e.stopPropagation();
        setPlaying(true);
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'de-DE';
        utterance.rate = 0.9;
        utterance.onend = () => setPlaying(false);
        utterance.onerror = () => setPlaying(false);
        window.speechSynthesis.speak(utterance);
      };
      return (
        <button
          className={`audio-btn ${small ? 'audio-btn--sm' : ''} ${playing ? 'audio-btn--playing' : ''}`}
          onClick={handleClick}
          title={`Listen: ${text}`}
          type="button"
        >
          🔊
        </button>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       VOCABULARY DATA — All words from NWn_A1_Glossar_Deutsch-Englisch.pdf
       Organized by Kapitel (1–12) matching Netzwerk neu A1
       Each word has: de (German), en (English), ex (example sentence)
       ═══════════════════════════════════════════════════════════ */

    /* ═══════════════════════════════════════════════════════════
       MAIN APP COMPONENT
       ═══════════════════════════════════════════════════════════ */
    const VocabularyApp = () => {
      const [screen, setScreen] = useState('home');
      const [selectedChapter, setSelectedChapter] = useState(null);
      const [stats, setStats] = useState({});
      const [gameState, setGameState] = useState(null);
      const [feedback, setFeedback] = useState(null); // {index, correct, selected}

      // Load stats from localStorage
      useEffect(() => {
        try {
          const saved = localStorage.getItem('vocabStats_v2');
          if (saved) setStats(JSON.parse(saved));
        } catch(e) {}
      }, []);

      const saveStats = (newStats) => {
        setStats(newStats);
        localStorage.setItem('vocabStats_v2', JSON.stringify(newStats));
      };

      const startGame = (chapterId) => {
        const chapter = VOCABULARY_DATA[chapterId];
        const shuffled = [...chapter.words].sort(() => Math.random() - 0.5);
        setSelectedChapter(chapterId);
        setScreen('game');
        setFeedback(null);
        setGameState({
          chapterId,
          words: shuffled,
          currentIndex: 0,
          score: 0,
          answers: [],
          startTime: Date.now(),
        });
      };

      const handleAnswer = (selectedOption) => {
        if (feedback) return; // Prevent double-click during feedback

        const currentWord = gameState.words[gameState.currentIndex];
        const isCorrect = selectedOption === currentWord.en;

        // Show feedback
        setFeedback({ correct: currentWord.en, selected: selectedOption, isCorrect });

        const newAnswers = [...gameState.answers, {
          word: currentWord.de,
          selected: selectedOption,
          correct: currentWord.en,
          ex: currentWord.ex,
          isCorrect,
        }];
        const newScore = isCorrect ? gameState.score + 1 : gameState.score;

        setTimeout(() => {
          setFeedback(null);
          if (gameState.currentIndex + 1 < gameState.words.length) {
            setGameState({
              ...gameState,
              currentIndex: gameState.currentIndex + 1,
              score: newScore,
              answers: newAnswers,
            });
          } else {
            completeGame(newScore, newAnswers);
          }
        }, 800);
      };

      const completeGame = (finalScore, answers) => {
        const duration = Math.round((Date.now() - gameState.startTime) / 1000);
        const percentage = Math.round((finalScore / gameState.words.length) * 100);
        const chapterId = gameState.chapterId;

        const newStats = {
          ...stats,
          [chapterId]: {
            completed: true,
            score: finalScore,
            total: gameState.words.length,
            percentage,
            duration,
            lastAttempt: new Date().toLocaleDateString(),
            attempts: (stats[chapterId]?.attempts || 0) + 1,
            bestScore: Math.max(finalScore, stats[chapterId]?.bestScore || 0),
          }
        };
        saveStats(newStats);
        setScreen('results');
        setGameState({ ...gameState, finalScore, answers, duration, percentage });
      };

      return (
        <>
          {screen === 'home' && (
            <HomeScreen stats={stats} startGame={startGame} />
          )}
          {screen === 'game' && gameState && (
            <GameScreen gameState={gameState} handleAnswer={handleAnswer} feedback={feedback} />
          )}
          {screen === 'results' && gameState && (
            <ResultsScreen gameState={gameState} stats={stats} setScreen={setScreen} startGame={startGame} setGameState={setGameState} />
          )}
        </>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       HOME SCREEN
       ═══════════════════════════════════════════════════════════ */
    const HomeScreen = ({ stats, startGame }) => {
      const completedChapters = Object.keys(stats).length;
      const totalScore = Object.values(stats).reduce((sum, ch) => sum + (ch.bestScore || ch.score || 0), 0);
      const totalWords = Object.values(VOCABULARY_DATA).reduce((sum, ch) => sum + ch.words.length, 0);

      return (
        <div className="screen-enter">
          <div className="home-header">
            <a href="index.html" className="home-header__back">
              <IconChevronLeft /> Back to DeutschBlitz
            </a>
            <h1>Netzwerk neu A1</h1>
            <p>Master all {totalWords} vocabulary words through interactive quizzes</p>
          </div>

          {completedChapters > 0 && (
            <div className="stats-row">
              <div className="stat-card">
                <div className="stat-card__label">
                  <IconBarChart />
                  <span>Chapters Completed</span>
                </div>
                <div className="stat-card__value">{completedChapters}/12</div>
              </div>
              <div className="stat-card">
                <div className="stat-card__label">
                  <IconZap />
                  <span>Best Words Learned</span>
                </div>
                <div className="stat-card__value">{totalScore}</div>
              </div>
              <div className="stat-card">
                <div className="stat-card__label">
                  <IconClock />
                  <span>Best Score</span>
                </div>
                <div className="stat-card__value">
                  {Math.max(...Object.values(stats).map(s => s.percentage), 0)}%
                </div>
              </div>
            </div>
          )}

          <div className="chapters-section">
            <h2>Select a Chapter</h2>
            <div className="chapters-grid">
              {Object.entries(VOCABULARY_DATA).map(([num, chapter]) => {
                const chapterStats = stats[num];
                return (
                  <div key={num} className="chapter-card" onClick={() => startGame(parseInt(num))}>
                    <div className="chapter-card__accent" />
                    <div className="chapter-card__top">
                      <div>
                        <div className="chapter-card__num">Kapitel {num}</div>
                        <div className="chapter-card__title">{chapter.title}</div>
                        <div className="chapter-card__desc">{chapter.description}</div>
                      </div>
                      {chapterStats && (
                        <div className="chapter-card__badge">{chapterStats.percentage}%</div>
                      )}
                    </div>
                    <div className="chapter-card__footer">
                      <span className="chapter-card__words">{chapter.words.length} words</span>
                      {chapterStats && (
                        <span className="chapter-card__attempts">
                          Attempts: {chapterStats.attempts} · Last: {chapterStats.lastAttempt}
                        </span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       GAME SCREEN
       ═══════════════════════════════════════════════════════════ */
    const GameScreen = ({ gameState, handleAnswer, feedback }) => {
      const currentWord = gameState.words[gameState.currentIndex];
      const prevIndexRef = useRef(-1);

      // Auto-play audio when a new question appears
      useEffect(() => {
        if (gameState.currentIndex !== prevIndexRef.current) {
          prevIndexRef.current = gameState.currentIndex;
          // Small delay so the UI renders first
          const timer = setTimeout(() => playAudio(currentWord.de), 300);
          return () => clearTimeout(timer);
        }
      }, [gameState.currentIndex, currentWord.de]);

      const options = useMemo(() => {
        // Get wrong options from the same chapter + some from others for variety
        const allTranslations = gameState.words.map(w => w.en);
        let wrongOptions = allTranslations.filter(w => w !== currentWord.en);
        wrongOptions = wrongOptions.sort(() => Math.random() - 0.5).slice(0, 3);
        return [currentWord.en, ...wrongOptions].sort(() => Math.random() - 0.5);
      }, [gameState.currentIndex]);

      const progress = ((gameState.currentIndex + 1) / gameState.words.length) * 100;

      return (
        <div className="game-container screen-enter">
          <div className="game-inner">
            <div className="game-header">
              <h1>Kapitel {gameState.chapterId}</h1>
              <div className="game-header__right">
                <div className="game-header__progress-text">
                  {gameState.currentIndex + 1} of {gameState.words.length}
                </div>
                <div className="game-header__score">{gameState.score}</div>
              </div>
            </div>

            <div className="progress-bar">
              <div className="progress-bar__fill" style={{ width: `${progress}%` }} />
            </div>

            <div className="question-card">
              <div className="question-card__label">What does this mean?</div>
              <div className="question-card__word-row">
                <div className="question-card__word">{currentWord.de}</div>
                <AudioBtn text={currentWord.de} />
              </div>
              {currentWord.ex && (
                <div className="question-card__example">
                  <div className="question-card__example-row">
                    <AudioBtn text={currentWord.ex} small />
                    <span className="question-card__example-text">"{currentWord.ex}"</span>
                  </div>
                </div>
              )}
            </div>

            <div className="options-list">
              {options.map((option, idx) => {
                let className = 'option-btn';
                if (feedback) {
                  if (option === feedback.correct) className += ' option-btn--correct';
                  else if (option === feedback.selected && !feedback.isCorrect) className += ' option-btn--wrong';
                }
                return (
                  <button
                    key={idx}
                    className={className}
                    onClick={() => handleAnswer(option)}
                    disabled={!!feedback}
                  >
                    {option}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       RESULTS SCREEN
       ═══════════════════════════════════════════════════════════ */
    const ResultsScreen = ({ gameState, stats, setScreen, startGame, setGameState }) => {
      const chapterId = gameState.chapterId;
      const chapterStats = stats[chapterId];
      const { percentage, finalScore, duration, answers } = gameState;
      const wrongAnswers = answers.filter(a => !a.isCorrect);

      let msgClass = 'results-message--ok';
      let msg = 'Nice try! Review and try again! 💪';
      if (percentage === 100) { msgClass = 'results-message--perfect'; msg = 'Perfect! You\'re a master! 🎉'; }
      else if (percentage >= 80) { msgClass = 'results-message--great'; msg = 'Excellent work! 🌟'; }
      else if (percentage >= 60) { msgClass = 'results-message--good'; msg = 'Good effort! Keep practicing! 👍'; }

      return (
        <div className="results-container screen-enter">
          <div className="results-inner">
            <div className="results-hero">
              <h1>Chapter Complete!</h1>
              <div className="score-ring">
                <div className="score-ring__bg" />
                <div className="score-ring__inner">
                  <div className="score-ring__percent">{percentage}%</div>
                  <div className="score-ring__fraction">{finalScore}/{gameState.words.length}</div>
                </div>
              </div>
              <div className={`results-message ${msgClass}`}>{msg}</div>
            </div>

            <div className="results-stats">
              <div className="results-stat">
                <div className="results-stat__label">Time</div>
                <div className="results-stat__value results-stat__value--white">
                  {Math.floor(duration / 60)}m {duration % 60}s
                </div>
              </div>
              <div className="results-stat">
                <div className="results-stat__label">Correct</div>
                <div className="results-stat__value results-stat__value--green">
                  {finalScore}/{gameState.words.length}
                </div>
              </div>
              <div className="results-stat">
                <div className="results-stat__label">Attempts</div>
                <div className="results-stat__value results-stat__value--white">
                  {chapterStats?.attempts || 1}
                </div>
              </div>
            </div>

            {wrongAnswers.length > 0 && (
              <div className="review-section">
                <h3>Words to Review</h3>
                {wrongAnswers.map((answer, idx) => (
                  <div key={idx} className="review-item">
                    <div className="review-item__header">
                      <div className="review-item__word">{answer.word}</div>
                      <AudioBtn text={answer.word} small />
                    </div>
                    <div className="review-item__wrong">You answered: {answer.selected}</div>
                    <div className="review-item__correct">Correct: {answer.correct}</div>
                    {answer.ex && <div className="review-item__example">💬 {answer.ex}</div>}
                  </div>
                ))}
              </div>
            )}

            <div className="results-actions">
              <button className="btn-action btn-action--primary" onClick={() => { setScreen('home'); setGameState(null); }}>
                Back to Chapters
              </button>
              <button className="btn-action btn-action--secondary" onClick={() => startGame(chapterId)}>
                Try Again
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       RENDER
       ═══════════════════════════════════════════════════════════ */
    if (ReactDOM.createRoot) {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<VocabularyApp />);
    } else {
      ReactDOM.render(<VocabularyApp />, document.getElementById('root'));
    }
  </script>
</body>
</html>
